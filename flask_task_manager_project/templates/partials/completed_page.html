            <section id="completedPage" class="page">
                <div class="section-head section-head-top">
                    <div>
                        <h2>Completed Tasks</h2>
                        <p>Browse confirmed work history, contributors, and completion details.</p>
                        <p id="completedTtsHint" class="page-shortcut-hint">Tip: highlight text and press Alt + R to read it aloud.</p>
                    </div>
                </div>

                <section class="card completed-search-card">
                    <div class="section-head">
                        <div>
                            <h3 id="completedSearchHeading">Search by user</h3>
                            <p id="completedSearchHint">Filter by someone who worked on the task or confirmed it complete.</p>
                        </div>
                        <p id="completedTaskCount" class="completed-task-count">0 tasks</p>
                    </div>

                    <div class="completed-search-row">
                        <div class="form-group completed-search-group">
                            <label for="completedTaskUserSearch">User</label>
                            <input id="completedTaskUserSearch" type="text" list="completedTaskUserSuggestions" placeholder="Type a username">
                            <datalist id="completedTaskUserSuggestions"></datalist>
                        </div>
                        <button type="button" id="clearCompletedTaskSearchBtn" class="ghost-btn">Clear search</button>
                    </div>
                </section>

                <section class="card completed-tasks-card">
                    <div id="completedTaskList" class="completed-task-list"></div>
                </section>
            </section>
