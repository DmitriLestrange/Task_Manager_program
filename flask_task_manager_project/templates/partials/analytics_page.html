            <section id="analyticsPage" class="page">
                <div class="section-head section-head-top">
                    <div>
                        <h2>Analytics</h2>
                        <p>Workspace totals and completed task trends for admins.</p>
                        <p id="analyticsTtsHint" class="page-shortcut-hint">Tip: highlight text and press Alt + R to read it aloud.</p>
                    </div>
                </div>

                <section class="analytics-layout">
                    <div class="analytics-grid">
                        <article class="card analytics-stat-card">
                            <p class="analytics-label">Total users</p>
                            <strong id="analyticsTotalUsers">0</strong>
                        </article>
                        <article class="card analytics-stat-card">
                            <p class="analytics-label">Total tasks</p>
                            <strong id="analyticsTotalTasks">0</strong>
                        </article>
                        <article class="card analytics-stat-card">
                            <p class="analytics-label">Completed tasks</p>
                            <strong id="analyticsCompletedTasks">0</strong>
                        </article>
                        <article class="card analytics-stat-card">
                            <p class="analytics-label">Overdue tasks</p>
                            <strong id="analyticsOverdueTasks">0</strong>
                        </article>
                    </div>

                    <article class="card analytics-chart-card">
                        <div class="section-head">
                            <div>
                                <h3>Completed Tasks Over Time</h3>
                                <p id="analyticsChartSummary">Loading analytics...</p>
                            </div>
                            <label class="setting-row analytics-filter">
                                <span>Time period</span>
                                <select id="analyticsPeriodSelect">
                                    <option value="24h">24 hours</option>
                                    <option value="1w" selected>1 week</option>
                                    <option value="1m">1 month</option>
                                    <option value="1y">1 year</option>
                                </select>
                            </label>
                            <label class="setting-row analytics-filter">
                                <span>Chart type</span>
                                <select id="analyticsChartTypeSelect">
                                    <option value="bar" selected>Bar chart</option>
                                    <option value="line">Line chart</option>
                                    <option value="pie">Pie chart</option>
                                </select>
                            </label>
                        </div>

                        <div id="analyticsChart" class="analytics-chart"></div>
                    </article>

                    <article class="card analytics-chart-card">
                        <div class="section-head">
                            <div>
                                <h3 id="analyticsMaterialsHeading">Materials Used</h3>
                                <p id="analyticsMaterialsSummary">Loading materials analytics...</p>
                            </div>
                        </div>

                        <div id="analyticsMaterialsChart" class="analytics-chart"></div>
                    </article>
                </section>
            </section>
