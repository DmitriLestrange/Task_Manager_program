        <div id="settingsPanel" class="settings-panel hidden">
            <div class="settings-header">
                <h3>Settings</h3>
                <button id="closeSettingsBtn" class="ghost-btn">✕</button>
            </div>

            <div class="settings-grid">
                <label class="setting-row">
                    <span id="languageLabel">Language</span>
                    <div class="language-picker">
                        <button type="button" id="languagePickerBtn" class="language-picker-btn" aria-haspopup="listbox" aria-expanded="false"></button>
                        <div id="languagePickerMenu" class="language-picker-menu hidden" role="listbox" aria-label="Language"></div>
                    </div>
                    <select id="languageSelect" class="hidden">
                        <option value="pl">🇵🇱 Polski</option>
                        <option value="en">🇬🇧 English</option>
                        <option value="ru">🇷🇺 Русский</option>
                        <option value="da">🇩🇰 Dansk</option>
                        <option value="no">🇳🇴 Norsk</option>
                        <option value="sv">🇸🇪 Svenska</option>
                        <option value="de">🇩🇪 Deutsch</option>
                        <option value="uk">🇺🇦 Українська</option>
                        <option value="pirate">🏴‍☠️ Pirate</option>
                        <option value="lolcat">😹 LOLCAT</option>
                        <option value="craft">⛏️ Blockcraft</option>
                    </select>
                </label>

                <div class="setting-row tts-voice-row" aria-live="polite">
                    <span id="ttsVoiceLabel">TTS voice</span>
                    <strong id="ttsVoiceStatus">Browser default</strong>
                </div>

                <label class="setting-row">
                    <span>Theme</span>
                    <select id="themeSelect">
                        <option value="default">Default</option>
                        <option value="dark">Black</option>
                        <option value="light">White</option>
                    </select>
                </label>

                <label class="setting-row">
                    <span>Upcoming deadline window</span>
                    <select id="upcomingThreshold">
                        <option value="24">24 hours</option>
                        <option value="48" selected>48 hours</option>
                        <option value="168">1 week</option>
                        <option value="720">1 month</option>
                        <option value="custom">Custom</option>
                    </select>
                </label>

                <label id="customThresholdRow" class="setting-row hidden">
                    <span>Custom threshold: <strong id="customThresholdValue">48 hours</strong></span>
                    <input id="customThresholdSlider" type="range" min="1" max="720" step="1" value="48">
                </label>

                <label class="custom-check">
                    <input type="checkbox" id="toggleAnimations">
                    <span class="checkmark"></span>
                    <span>Enable animations</span>
                </label>

                <label class="custom-check setting-row">
                    <input type="checkbox" id="toggleNotifications">
                    <span class="checkmark"></span>
                    <span>Deadline reminders</span>
                </label>

                <label class="custom-check setting-row">
                    <input type="checkbox" id="compactMode">
                    <span class="checkmark"></span>
                    <span>Compact layout</span>
                </label>

                <label class="custom-check setting-row">
                    <input type="checkbox" id="accessibilityMode">
                    <span class="checkmark"></span>
                    <span>Accessibility Mode</span>
                </label>

                <label class="custom-check setting-row">
                    <input type="checkbox" id="toggleSounds">
                    <span class="checkmark"></span>
                    <span>Task completion sound</span>
                </label>
            </div>
        </div>
