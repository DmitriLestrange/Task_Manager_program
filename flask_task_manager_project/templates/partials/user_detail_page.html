            <section id="userDetailPage" class="page">
                <div class="section-head section-head-top">
                    <div>
                        <h2>User Profile</h2>
                        <p>Profile details, task activity, and completed work history.</p>
                        <p id="userDetailTtsHint" class="page-shortcut-hint">Tip: highlight text and press Alt + R to read it aloud.</p>
                    </div>
                    <button type="button" id="userDetailBackBtn" class="ghost-btn">Back</button>
                </div>

                <section class="user-detail-layout">
                    <article class="card user-detail-hero">
                        <div class="user-detail-head">
                            <img id="userDetailAvatar" class="user-detail-avatar" alt="User profile picture">
                            <div class="user-detail-main">
                                <h3 id="userDetailName">User</h3>
                                <div id="userDetailRole"></div>
                                <div class="user-detail-facts">
                                    <div class="user-detail-fact">
                                        <span>Joined</span>
                                        <strong id="userDetailJoined">-</strong>
                                    </div>
                                    <div class="user-detail-fact">
                                        <span>Contact</span>
                                        <strong id="userDetailContact">-</strong>
                                    </div>
                                </div>
                            </div>
                            <div class="user-detail-actions">
                                <button type="button" id="userDetailMessageBtn" class="secondary-btn">Message</button>
                            </div>
                        </div>
                    </article>

                    <section class="user-detail-stats-grid">
                        <article class="card analytics-stat-card">
                            <p class="analytics-label">Assigned tasks</p>
                            <strong id="userDetailAssignedTasks">0</strong>
                        </article>
                        <article class="card analytics-stat-card">
                            <p class="analytics-label">Created tasks</p>
                            <strong id="userDetailCreatedTasks">0</strong>
                        </article>
                        <article class="card analytics-stat-card">
                            <p class="analytics-label">Completed tasks</p>
                            <strong id="userDetailCompletedTasks">0</strong>
                        </article>
                        <article class="card analytics-stat-card">
                            <p class="analytics-label">Overdue tasks</p>
                            <strong id="userDetailOverdueTasks">0</strong>
                        </article>
                    </section>

                    <article class="card analytics-chart-card">
                        <div class="section-head">
                            <div>
                                <h3>Completed Tasks Over Time</h3>
                                <p id="userDetailChartSummary">Loading profile...</p>
                            </div>
                            <label class="setting-row analytics-filter">
                                <span>Time period</span>
                                <select id="userDetailPeriodSelect">
                                    <option value="24h">24 hours</option>
                                    <option value="1w" selected>1 week</option>
                                    <option value="1m">1 month</option>
                                    <option value="1y">1 year</option>
                                </select>
                            </label>
                        </div>

                        <div id="userDetailChart" class="analytics-chart"></div>
                    </article>
                </section>
            </section>
